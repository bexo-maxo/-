<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarotoo | ქართული ტარო</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    @font-face { font-family: 'Boska'; src: url('https://tarotoo.com/wp-content/themes/tarotootheme/assets/fonts/boska/Boska-Regular-Light.woff2') format('woff2'); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Lexend'; src: url('https://tarotoo.com/wp-content/themes/tarotootheme/assets/fonts/lexend/Lexend-Regular-Light.woff2') format('woff2'); font-weight: 400; font-style: normal; font-display: swap; }
  </style>
</head>
<body>
  <div class="hero-page">
    <header class="hero-header">
      <a class="brand" href="#hero">
        <img class="brand-symbol" src="https://tarotoo.com/wp-content/themes/tarotootheme/assets/svg/logo-symbol.svg" alt="Tarotoo">
        <img class="brand-logo" src="https://tarotoo.com/wp-content/themes/tarotootheme/assets/svg/logo-typo.svg" alt="Tarotoo">
      </a>
      <button class="hero-action" type="button">KA</button>
    </header>

    <main class="hero" id="hero">
      <div class="hero-background"></div>

      <div class="hero-deco hero-deco-left">
        <span class="hero-deco-dot"></span>
        <img src="https://tarotoo.com/wp-content/themes/tarotootheme/assets/svg/top-left-icon.svg" alt="">
      </div>

      <div class="hero-deco hero-deco-right-top">
        <span class="hero-deco-dot"></span>
        <img src="https://tarotoo.com/wp-content/themes/tarotootheme/assets/svg/sun-star.svg" alt="">
      </div>

      <div class="hero-deco hero-deco-right-bottom">
        <span class="hero-deco-dot"></span>
        <img src="https://tarotoo.com/wp-content/themes/tarotootheme/assets/svg/sun-face.svg" alt="">
      </div>

      <section class="hero-body">
        <div class="hero-copy">
          <p class="eyebrow">ტარო კითხვა</p>
          <h1>გამოიცანი შენი მომავალი ქართულ Tarotoo-ში</h1>
          <p>მოისმინე ინტუიცია, იპოვნე პასუხები სიყვარულში, სამსახურში და პირად ცხოვრებაში ყველაზე მარტივი და ვიზუალური გზით.</p>
        </div>

        <div class="hero-card-frame">
          <div class="hero-orbit"></div>
          <div class="hero-card-glow"></div>
          <div class="hero-card-inner">
            <img src="https://tarotoo.com/wp-content/uploads/card-back-usual-625x1024.jpg-1.webp" alt="Tarot card">
          </div>
        </div>
      </section>

      <nav class="hero-menu" aria-label="ტარო კატეგორიები">
        <a class="menu-item" href="#">ტარო</a>
        <a class="menu-item" href="#">სიყვარულის ტარო</a>
        <a class="menu-item" href="#">კი / არა</a>
        <a class="menu-item" href="#">დღიური ტარო</a>
        <a class="menu-item" href="#">1 კარტი</a>
        <a class="menu-item" href="#">3 კარტი</a>
        <a class="menu-item" href="#">ფსიქიკური ჩატი</a>
      </nav>

      <div class="hero-scroll">
        <img src="https://tarotoo.com/wp-content/themes/tarotootheme/assets/svg/arrow-bottom.svg" alt="Scroll down">
      </div>
    </main>
  </div>
</body>
</html>
